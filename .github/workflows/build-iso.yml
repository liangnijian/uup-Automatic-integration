name: 运行批处理

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # 允许手动触发

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 运行 uup-automatically-execute.cmd
        run: .\uup-automatically-execute.cmd

      - name: 上传 ISO
        uses: actions/upload-artifact@v4
        with:
          name: uup-iso
          path: |
            *.iso
