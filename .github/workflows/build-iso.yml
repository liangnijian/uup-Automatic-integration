name: Build ISO

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # 允许手动触发

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run batch script
        run: .\uup-automatically-execute.cmd

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-iso-file
          path: |
            *.iso
